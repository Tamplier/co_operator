---
# Enable all default linters
EnableDefaultLinters: true

# Configure individual linters
linters:
  ErbSafety:
    enabled: true
  Rubocop:
    enabled: true
    rubocop_config:
      require:
        - rubocop-rails
      inherit_from:
        - .rubocop.yml
      Layout/LeadingEmptyLines:
        Enabled: false
      Layout/InitialIndentation:
        Enabled: false
      Layout/TrailingEmptyLines:
        Enabled: false
      Layout/TrailingWhitespace:
        Enabled: false
      Naming/FileName:
        Enabled: false
      Style/FrozenStringLiteralComment:
        Enabled: false
      Layout/LineLength:
        Enabled: true
      Lint/UselessAssignment:
        Enabled: false
      Rails/OutputSafety:
        Enabled: true
